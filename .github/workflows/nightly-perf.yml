name: nightly-perf

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  perf-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "scikit-learn>=1.4" "numpy>=1.24" "scipy>=1.11" \
            "joblib>=1.3" "openpyxl>=3.1" "pandas>=2.1" \
            pytest psutil

      - name: Run perf smoke tests
        env:
          PYTHONPATH: .
          RUN_PERF_HASH: "1"
        run: pytest tests/test_cluster_pipeline_perf_smoke.py tests/test_hash_perf.py -v

      - name: Run perf_smoke.py if present
        run: |
          if [ -f tools/perf_smoke.py ]; then
            python tools/perf_smoke.py || true
          fi
