name: mutation-score

# ADR-0006: warn-only nightly mutation testing on high-value pure-logic
# modules. Each module runs in its own job so a slow mutant in one module
# does not gate the others. The harness lives in ci/mutation_smoke.py
# and is also runnable locally (see CLAUDE.md).

on:
  schedule:
    - cron: "12 4 * * *"   # 04:12 UTC ≈ 07:12 MSK
  workflow_dispatch:        # allow manual trigger from the Actions tab

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutate:
    name: mutmut (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: ml_distillation.py
            tests: tests/test_distill_numerics.py tests/test_property_invariants.py
            threshold: "0.75"
          - module: workflow_contracts.py
            tests: tests/test_workflow_contracts.py
            threshold: "0.70"
          - module: ml_core.py
            tests: tests/test_ml_core.py
            threshold: "0.65"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps + mutmut
        run: |
          python -m pip install --upgrade pip
          pip install \
            "scikit-learn>=1.4" "numpy>=1.24" "scipy>=1.11" \
            "joblib>=1.3" "openpyxl>=3.1" "pandas>=2.1" \
            "cryptography>=42.0" "psutil>=5.9" \
            pytest hypothesis "mutmut>=2.4,<3"
          # mutmut 3.x rewrote the CLI (no --paths-to-mutate, no --json output,
          # also mutates test files). Our wrapper in ci/mutation_smoke.py is
          # written against 2.x semantics — see ADR-0006 §"Implementation status".

      - name: Run mutation smoke
        env:
          PYTHONPATH: .
          BRT_LLM_PROVIDER: offline
        # warn-only per ADR-0006 §4 — release gate, not PR gate.
        # The script's exit 1 is captured but does not fail the workflow;
        # CI uploads the JSON summary so trends are tracked over time.
        run: |
          python ci/mutation_smoke.py "${{ matrix.module }}" \
              --tests ${{ matrix.tests }} \
              --threshold "${{ matrix.threshold }}" \
              --cache-dir ".mutmut-cache-${{ matrix.module }}" \
              | tee "mutation-${{ matrix.module }}.json" \
            || echo "::warning::mutation score below threshold for ${{ matrix.module }}"

      - name: Upload mutation summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-${{ matrix.module }}
          path: mutation-${{ matrix.module }}.json
          if-no-files-found: warn
