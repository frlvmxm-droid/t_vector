name: quality-gates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 mypy==1.11.2

      - name: Ruff check (strict on contract/ML-core modules)
        run: |
          # Gate on modules we actively maintain to the ruff baseline.
          # The rest of the codebase is scanned warn-only until cleaned up;
          # see weekly-quality-scan.yml for the extended report.
          ruff check \
            workflow_contracts.py artifact_contracts.py \
            ml_core.py ml_compat.py ml_diagnostics.py ml_distillation.py \
            ml_mlm_pretrain.py excel_utils.py entity_normalizer.py \
            model_loader.py llm_client.py llm_reranker.py

      - name: Ruff check (warn-only, full repo)
        run: ruff check . || true

      - name: Mypy (soft, project defaults)
        run: mypy --config-file pyproject.toml . || true

      - name: Mypy (strict on ml_* and workflow_contracts)
        run: |
          # follow_imports=silent keeps strict scope to the gated modules;
          # imports into legacy code are type-checked shallowly so cascade
          # errors in ml_vectorizers/ml_diagnostics don't block the gate.
          mypy --strict --ignore-missing-imports --follow-imports=silent \
            ml_core.py ml_compat.py workflow_contracts.py artifact_contracts.py

  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit==1.7.9

      - name: Bandit (HIGH severity gate)
        run: bandit -r . --exclude ./tests,./ci,./fixtures -ll -q

  tests:
    name: Pytest (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "scikit-learn>=1.4" "numpy>=1.24" "scipy>=1.11" \
            "joblib>=1.3" "openpyxl>=3.1" "pandas>=2.1" \
            "cryptography>=42.0" "psutil>=5.9" \
            pytest pytest-cov

      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: |
          # --cov-fail-under=45 is a regression-prevention floor, not a target.
          # Current coverage is ~49%; ratchet this value upward as Phase B
          # adds service-layer tests (goal: 75%).
          pytest --cov=. --cov-report=xml --cov-report=term \
            --cov-fail-under=45 \
            --ignore=tests/test_heavy_modules.py \
            -q

      - name: Upload coverage artifact
        if: matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
