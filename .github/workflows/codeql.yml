name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly at 04:17 UTC Monday — off-peak, avoids rush-hour contention with
    # the nightly-perf workflow (03:00 UTC).
    - cron: "17 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL analyse (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-and-quality includes the security-extended query suite
          # plus maintainability rules; noisier but catches more on a small
          # codebase where review bandwidth is ample.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyse
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
